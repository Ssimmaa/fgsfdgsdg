{% include 'tasks/partials/form_errors.html' with form=photo_form %}

<div class="profile-photo-actions">
    <div class="profile-photo-actions__controls">
        <form
            method="post"
            action="{{ upload_url }}"
            enctype="multipart/form-data"
            class="profile-photo-form"
            data-avatar-upload-form
            data-avatar-has-photo="{% if avatar_url %}true{% else %}false{% endif %}"
        >
            {% csrf_token %}
            <label for="{{ photo_form.photo.id_for_label }}" class="sr-only" data-i18n="profile.uploadPhoto"></label>
            {{ photo_form.photo }}
            <button
                type="button"
                class="button button--secondary button--compact profile-photo-button"
                data-avatar-picker-trigger
                data-i18n="{% if avatar_url %}profile.changePhoto{% else %}profile.addPhoto{% endif %}"
            ></button>
        </form>

        {% if avatar_url %}
            <form method="post" action="{{ delete_url }}" class="avatar-remove-form">
                {% csrf_token %}
                <button type="submit" class="ghost-button ghost-button--compact profile-photo-button profile-photo-button--danger">
                    <span class="sr-only" data-i18n="profile.deletePhoto"></span>
                    <span data-i18n="profile.removePhoto"></span>
                </button>
            </form>
        {% endif %}
    </div>
    <p class="form-help profile-photo-actions__hint" data-i18n="profile.photoFormats"></p>
</div>
