{% if avatar_url %}
    <img
        src="{{ avatar_url }}"
        alt="{{ avatar_alt }}"
        class="avatar{% if avatar_class %} {{ avatar_class }}{% endif %}"
        {% if avatar_size %}width="{{ avatar_size }}" height="{{ avatar_size }}"{% endif %}
        loading="{{ avatar_loading|default:'lazy' }}"
        decoding="async"
    >
{% else %}
    <span
        class="avatar avatar--fallback{% if avatar_class %} {{ avatar_class }}{% endif %}"
        role="img"
        aria-label="{{ avatar_alt }}"
    >{{ avatar_initials }}</span>
{% endif %}
